      tags:
        - Admin
      summary: Adiciona um novo admin
      description: Endpoint para enviar os dados do admin a serem cadastrados
      requestBody:
        description: JSON contendo os dados do novo admin a ser inserido no sistema
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Admin'
        required: true
      responses:
        '201':
          description: Success Created Item
        '400':
          description: Error Bad Request
        '415':
          description: Error Content Type
        '500':
          description: Error Internal Server (Controller | Model)
    get:
      tags:
        - Admin
      summary: Lista todos os admins
      description: Endpoint para listar todos os admins cadastrados
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminGet'
        '404':
          description: Error Not Found
        '500':
          description: Error Internal Server (Controller | Model)
  /v1/frequency80cafe/administracao/admin/{id}:
