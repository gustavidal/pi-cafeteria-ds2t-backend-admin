          in: path
          description: id para realizar a busca do admin
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGet'          
        '400':
          description: Error Bad Request (id)
        '404':
          description: Error Not Found
        '500':
          description: Error Internal Server (Controller | Model)
    put:
      tags:
        - Admin
      summary: Atualiza um admin pelo id
      description: Endpoint para atualizar um admin pelo id
      parameters:
        - name: id
          in: path
          description: id para realizar a busca do admin
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Dados para atualizar um admin existente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Admin'
        required: true
      responses:
        '200':
          description: OK
        '400':
          description: Error Bad Request (id | dados)
        '404':
          description: Error Not Found
        '415':
          description: Error Content Type
        '500':
          description: Error internal server (Controller | Model)
    delete:
      tags:
        - Admin
      summary: Exclui um admin pelo id
      description: Endpoint para excluir um admin pelo id
      parameters:
        - name: id
