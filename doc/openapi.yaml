openapi: 3.0.3
info:
  title: Projeto de Controle de Produtos - Frequency 80 Cafe
  description: |-
   API destinada a controle de produtos para a cafeteria temática "Frequency 80 Cafe".
  termsOfService: http://swagger.io/terms/
  contact:
    email: gustavovidalgva@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io
servers:
