        '500':
          description: Error Internal Server (Controller | Model)
  /v1/frequency80cafe/administracao/admin/login:
    post:
      tags:
        - Admin
      summary: Realiza o login do admin
      description: Endpoint para realizar o login do admin
      requestBody:
        description: JSON contendo os dados do admin para realizar o login
        content:
